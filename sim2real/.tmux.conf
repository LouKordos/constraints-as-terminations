# Address vim mode switching delay (http://superuser.com/a/252717/65504)
set -s escape-time 0
set -g history-limit 100000

# Increase tmux messages display duration from 750ms to 4s
set -g display-time 4000

# Refresh 'status-left' and 'status-right' more often, from every 15s to 5s
set -g status-interval 5

set-window-option -g mode-keys vi
bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi V send -X select-line

# OSC52 clipboard integration: "on" means tmux sets the outside terminal clipboard AND allows apps inside tmux 
# like Vim+OSCYank to set tmux's clipboard, which tmux forwards outward.
set -g set-clipboard on

# Only advertise "clipboard"/Ms for common TERM values that are likely OSC52-capable.
# Avoid pretending "*:clipboard" works everywhere (VTE terminals don't support OSC52). 
set -asq terminal-features ',xterm*:clipboard'
set -asq terminal-features ',tmux*:clipboard'
set -asq terminal-features ',screen*:clipboard'

# Fallback for older tmux (pre-3.2): add Ms capability via terminal-overrides. 
set -asq terminal-overrides ',xterm*:Ms=\E]52;%p1%s;%p2%s\007'
set -asq terminal-overrides ',tmux*:Ms=\E]52;%p1%s;%p2%s\007'
set -asq terminal-overrides ',screen*:Ms=\E]52;%p1%s;%p2%s\007'

# tmux 3.3+ passthrough gating (not required for OSC52, but harmless with -q).
set -gq allow-passthrough on

# copy-mode default: always use tmux's clipboard path (OSC52 -> active terminal clipboard)
bind-key -T copy-mode-vi y send -X copy-selection-and-cancel

# Optional: if explicitly want to copy into the host Wayland clipboard, use Shift+Y.
# This is intentionally not the default so remote attach doesn't copy to the wrong machine.
if-shell 'command -v wl-copy >/dev/null 2>&1' "bind-key -T copy-mode-vi Y send -X copy-pipe-and-cancel 'wl-copy'"

# Set parent terminal title to reflect current window in tmux session 
set -g set-titles on
set -g set-titles-string "#H:#I:#W"

# override the default “new-window” so it inherits the current pane’s cwd
bind-key c new-window -c "#{pane_current_path}"

set -g default-terminal "tmux-256color"
# tell tmux to advertise true-color support:
set -ga terminal-overrides ",xterm-256color:Tc"
set -as terminal-features ",*:RGB"
set -ga terminal-overrides ",tmux-256color:Tc"

set-window-option -g xterm-keys on
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'
